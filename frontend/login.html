<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Essential Hub</title>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div id="login-section">
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to your account</p>
      <div class="alert alert-error" id="login-error"></div>
      <form id="login-form">
        <div class="form-group">
          <label class="form-label">Email address</label>
          <input id="login-email" type="email" class="form-input" placeholder="you@example.com" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input id="login-password" type="password" class="form-input" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Sign In</button>
      </form>
      <p class="auth-toggle">No account? <a href="#" id="show-register">Create one</a></p>
    </div>

    <div id="register-section" style="display:none">
      <h1 class="auth-title">Create account</h1>
      <p class="auth-subtitle">Join ShopDark today</p>
      <div class="alert alert-error" id="register-error"></div>
      <div class="alert alert-success" id="register-success"></div>
      <form id="register-form">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input id="reg-username" type="text" class="form-input" placeholder="johndoe" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Email address</label>
          <input id="reg-email" type="email" class="form-input" placeholder="you@example.com" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input id="reg-password" type="password" class="form-input" placeholder="Min. 6 characters" required/>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Create Account</button>
      </form>
      <p class="auth-toggle">Already have an account? <a href="#" id="show-login">Sign in</a></p>
    </div>
  </div>
</div>
<script src="js/api.js"></script>
<script src="js/pages/auth.js"></script>
</body>
</html>
